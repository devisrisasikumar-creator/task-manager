<!DOCTYPE html>
<html>

<head>
    <title>Task Manager</title>
</head>

<body>

    <h1>Task Manager</h1>

    <form method="POST">

        <input type="text" name="task" placeholder="Enter your task">

        <button type="submit">Add Task</button>

    </form>

    <ul>

        {% for task in tasks %}

            <li>{{ task }}</li>

        {% endfor %}

    </ul>

</body>

</html>
